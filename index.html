<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS Анимации</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="item">
  <p>1. Прыжок</p>
  <div class="box bounce"></div>
</div>

<div class="item">
  <p>2. Вращение</p>
  <div class="box rotate"></div>
</div>

<div class="item">
  <p>3. Увеличение</p>
  <div class="box scale"></div>
</div>

<div class="item">
  <p>4. Прозрачность</p>
  <div class="box fade"></div>
</div>

<div class="item">
  <p>5. Движение</p>
  <div class="box move"></div>
</div>

<div class="item">
  <p>6. Наклон</p>
  <div class="box skew"></div>
</div>

<div class="item">
  <p>7. Смена цвета</p>
  <div class="box color"></div>
</div>

<div class="item">
  <p>8. Скругление</p>
  <div class="box border"></div>
</div>

<div class="item">
  <p>9. Тень</p>
  <div class="box shadow"></div>
</div>

<div class="item">
  <p>10. Быстрое вращение</p>
  <div class="box spin"></div>
</div>

<div class="item">
  <p>11. Пульсация</p>
  <div class="box pulse"></div>
</div>

<div class="item">
  <p>12. Переворот</p>
  <div class="box flip"></div>
</div>

<div class="item">
  <p>13. Слайд</p>
  <div class="box slide"></div>
</div>

<div class="item">
  <p>14. Волна</p>
  <div class="box wave"></div>
</div>

<div class="item">
  <p>15. Зум</p>
  <div class="box zoom"></div>
</div>

<div class="item">
  <p>16. Мигание</p>
  <div class="box blink"></div>
</div>

<div class="item">
  <p>17. Рост</p>
  <div class="box grow"></div>
</div>

<div class="item">
  <p>18. Сжатие</p>
  <div class="box shrink"></div>
</div>

<div class="item">
  <p>19. Тряска</p>
  <div class="box shake"></div>
</div>

<div class="item">
  <p>20. Подпрыгивание</p>
  <div class="box jump"></div>
</div>



</body>
</html>
